---
# DEPRECATED: Use dev.yml with appropriate role toggles instead.
# This file is kept for backward compatibility with existing macOS setups.
- name: Configure macOS development environment
  hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir }}"
    claude_provider: anthropic
    base_enabled: false
    docker_enabled: false
    dev_tools_enabled: false
    ssh_enabled: false
    shell_enabled: true
    git_enabled: true
    bun_enabled: true
    claude_code_enabled: true
  roles:
    - role: shell
      when: shell_enabled | bool
    - role: git
      when: git_enabled | bool
    # bun before claude_code — claudeclaw daemon + the wrapper both need it.
    - role: bun
      when: bun_enabled | bool
    - role: claude_code
      when: claude_code_enabled | bool
