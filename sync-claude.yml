---
# Runtime sync — invoked by the container entrypoint on every start.
# Re-runs the idempotent claude_code role against the mounted ~/.claude volume
# so dots updates propagate without rebuilding the image.
- name: Sync Claude Code state
  hosts: all
  connection: local
  gather_facts: true
  vars:
    claude_config_mode: copy
  roles:
    - role: claude_code
