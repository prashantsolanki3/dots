---
# DEPRECATED: This playbook is kept for backward compatibility.
# Prefer the role-based approach: use dev.yml for new workstation setups.
# See roles/ directory for modular, toggleable configuration.
- name: Configure AWS Pluto Instance
  hosts: all
  vars_files:
    - vars/pluto_defaults.yml
  become: true
  gather_facts: true
  vars:
    apt_retries: 15
    apt_retry_delay: 10

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
    - name: Reload systemctl
      ansible.builtin.command: systemctl daemon-reload

  pre_tasks:
    - name: Update System
      when: update_system
      ansible.builtin.include_tasks: tasks/update_system.yml

    - name: Install base system packages
      ansible.builtin.package:
        name: "{{ item }}"
        state: latest
      loop:
        - curl
        - htop
        - unzip
        - wget
        - zip
        - colordiff
        - lsb-release
        - git
        - fuse
        - s3fs
      tags: ["base_packages", "packages"]
      become: true
      register: result
      until: result is not failed
      retries: "{{ apt_retries }}"
      delay: "{{ apt_retry_delay }}"

  tasks:
    - name: Ensure user dot files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0600"
        owner: "{{ host_username }}"
        group: "{{ host_username }}"
      # Add user dot files here
      loop:
        - { src: dots/.wgetrc, dest: "/home/{{ host_username }}/.wgetrc" }
        - { src: dots/.gitignore, dest: "/home/{{ host_username }}/.gitignore" }
        - { src: dots/.curlrc, dest: "/home/{{ host_username }}/.curlrc" }
        - { src: dots/.bash_aliases, dest: "/home/{{ host_username }}/.bash_aliases" }
      tags: ["user_dots", "dots"]

    - name: Configure Git
      ansible.builtin.include_tasks: tasks/configure_git.yml


    - name: Ensure template files
      ansible.builtin.template:
        src: '{{ item.src }}'
        dest: '{{ item.dest }}'
        mode: '{{ item.mode }}'
        owner: '{{ host_username }}'
        group: '{{ host_username }}'
      loop:
        - { src: aws/credentials, dest: '/etc/passwd-s3fs', mode: '0600' }

    - name: Mount External Network volumes
      when:
        - mounts is defined
      ansible.builtin.include_tasks: tasks/mount_network_volumes.yml
