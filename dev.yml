---
- name: Configure development workstation
  hosts: all          # typically localhost via inventory; kept as 'all' for flexibility
  connection: local   # this playbook provisions the local machine
  vars:
    base_enabled: true
    shell_enabled: true
    git_enabled: true
    docker_enabled: true
    dev_tools_enabled: true
    bun_enabled: true
    claude_code_enabled: true
    llm_wiki_enabled: true
    ssh_enabled: true
  roles:
    - role: base
      when: base_enabled | bool
    - role: shell
      when: shell_enabled | bool
    - role: git
      when: git_enabled | bool
    - role: docker
      when: docker_enabled | bool
    - role: dev_tools
      when: dev_tools_enabled | bool
    # bun before claude_code — the claudeclaw-start wrapper (deployed by
    # claude_code) calls into ~/.bun/bin/bun.
    - role: bun
      when: bun_enabled | bool
    - role: claude_code
      when: claude_code_enabled | bool
    # llm_wiki after claude_code — shares the claude_npm_packages mechanism
    # for qmd, and the claude_code role is responsible for merging
    # files/mcp/qmd.json into ~/.claude.json before llm_wiki uses it.
    - role: llm_wiki
      when: llm_wiki_enabled | bool
    - role: ssh
      when: ssh_enabled | bool
