---
- name: Configure development workstation
  hosts: all
  vars:
    base_enabled: true
    shell_enabled: true
    git_enabled: true
    docker_enabled: true
    dev_tools_enabled: true
    claude_code_enabled: true
    ssh_enabled: true
  roles:
    - role: base
      when: base_enabled | bool
    - role: shell
      when: shell_enabled | bool
    - role: git
      when: git_enabled | bool
    - role: docker
      when: docker_enabled | bool
    - role: dev_tools
      when: dev_tools_enabled | bool
    - role: claude_code
      when: claude_code_enabled | bool
    - role: ssh
      when: ssh_enabled | bool
