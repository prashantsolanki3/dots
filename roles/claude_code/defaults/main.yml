---
claude_code_enabled: true

# Provider: anthropic, bedrock, vertex
claude_provider: anthropic

# Path to the dotfiles repo (used for symlinks)
dotfiles_dir: "{{ playbook_dir }}"

# Config install mode: "link" for local dev (symlinks), "copy" for Docker (files copied)
claude_config_mode: link

# Target home directory (defaults to current user, override for Docker with host_username)
claude_home: "{{ '/home/' + host_username if host_username is defined else ansible_facts['env']['HOME'] }}"

# ── Marketplace plugins (installed via `claude plugin install <name>`) ──────
claude_plugins:
  - ralph-loop
  # - another-plugin

# ── npm packages (installed globally via `npm install -g`) ─────────────────
# For skills/tools that are npm packages invoked via npx.
claude_npm_packages: []
  # - "@anthropic-ai/claude-code-mcp"
  # - "impeccable"

# ── Local skills (deployed from files/skills/<name>/SKILL.md) ──────────────
# Skills auto-activate when Claude detects relevant context.
deploy_skills: true

# ── Local commands (deployed from files/commands/<name>.md) ────────────────
# Commands are explicit /slash triggers available in all projects.
deploy_commands: true
