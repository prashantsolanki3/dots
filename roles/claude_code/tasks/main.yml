---
# roles/claude_code - Install and configure Claude Code CLI
#
# Handles macOS (Homebrew) and Linux (npm) installations.
# Config mode: "link" (default, symlinks for local dev) or "copy" (for Docker).
#
# NOTE: The "link" config mode uses controller-local paths (role_path) for
# symlink sources. This is intentional — both mac.yml and dev.yml run with
# connection: local, so controller paths == target paths. The "copy" mode
# should be used for remote or containerised targets.

# ── macOS: verify claude is reachable via Homebrew ───────────────────────────
- name: "[macOS] Check that claude CLI binary exists via Homebrew"
  ansible.builtin.stat:
    path: "{{ homebrew_prefix | default('/opt/homebrew' if ansible_facts['architecture'] == 'arm64' else '/usr/local') }}/bin/claude"
  register: claude_bin_mac
  when: ansible_facts['os_family'] == "Darwin"

- name: "[macOS] Warn if claude binary not found (install via: brew install claude)"
  ansible.builtin.debug:
    msg: >
      claude binary not found at expected Homebrew path.
      Install with: brew install claude
  when:
    - ansible_facts['os_family'] == "Darwin"
    - not claude_bin_mac.stat.exists

# ── Linux / WSL2: always install/upgrade Claude Code to latest via npm ─────
- name: "[Linux] Install/upgrade Claude Code to latest via npm"
  become: true
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: latest
  when: ansible_facts['os_family'] == "Debian"

# ── Create config directories ───────────────────────────────────────────────
- name: Ensure ~/.claude/agents directory exists
  ansible.builtin.file:
    path: "{{ claude_home }}/.claude/agents"
    state: directory
    mode: '0755'

# ── Config mode: symlink (local dev) ────────────────────────────────────────
- name: Symlink Claude Code settings.json
  ansible.builtin.file:
    src: "{{ role_path }}/files/settings.json"
    dest: "{{ claude_home }}/.claude/settings.json"
    state: link
    force: true
  when: claude_config_mode | default('link') == 'link'

- name: Symlink Claude Code CLAUDE.md
  ansible.builtin.file:
    src: "{{ role_path }}/files/CLAUDE.md"
    dest: "{{ claude_home }}/.claude/CLAUDE.md"
    state: link
    force: true
  when: claude_config_mode | default('link') == 'link'

# ── Config mode: copy (Docker) ──────────────────────────────────────────────
- name: Copy Claude Code settings.json
  ansible.builtin.copy:
    src: settings.json
    dest: "{{ claude_home }}/.claude/settings.json"
    mode: '0644'
  when: claude_config_mode | default('link') == 'copy'

- name: Copy Claude Code CLAUDE.md
  ansible.builtin.copy:
    src: CLAUDE.md
    dest: "{{ claude_home }}/.claude/CLAUDE.md"
    mode: '0644'
  when: claude_config_mode | default('link') == 'copy'

# ── Agent files (both modes) ────────────────────────────────────────────────
- name: Find agent files in role
  ansible.builtin.find:
    paths: "{{ role_path }}/files/agents"
    patterns: "*.md"
  register: agent_files

- name: Symlink each agent file into ~/.claude/agents/
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ claude_home }}/.claude/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ agent_files.files }}"
  when: claude_config_mode | default('link') == 'link'

- name: Copy each agent file into ~/.claude/agents/
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ claude_home }}/.claude/agents/{{ item.path | basename }}"
    mode: '0644'
  loop: "{{ agent_files.files }}"
  when: claude_config_mode | default('link') == 'copy'

# ── Skills (user-level, available in all projects) ─────────────────────────
- name: Ensure ~/.claude/skills directory exists
  when: deploy_skills | default(true) | bool
  ansible.builtin.file:
    path: "{{ claude_home }}/.claude/skills"
    state: directory
    mode: '0755'

- name: Find skill directories in role
  when: deploy_skills | default(true) | bool
  ansible.builtin.find:
    paths: "{{ role_path }}/files/skills"
    file_type: directory
    recurse: false
  register: skill_dirs

- name: Symlink each skill directory into ~/.claude/skills/
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ claude_home }}/.claude/skills/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ skill_dirs.files }}"
  when: deploy_skills | default(true) | bool and claude_config_mode | default('link') == 'link'

- name: Copy each skill directory into ~/.claude/skills/
  ansible.builtin.copy:
    src: "{{ item.path }}/"
    dest: "{{ claude_home }}/.claude/skills/{{ item.path | basename }}/"
    mode: '0644'
  loop: "{{ skill_dirs.files }}"
  when: deploy_skills | default(true) | bool and claude_config_mode | default('link') == 'copy'

# ── Commands (user-level, available in all projects) ───────────────────────
- name: Ensure ~/.claude/commands directory exists
  when: deploy_commands | default(true) | bool
  ansible.builtin.file:
    path: "{{ claude_home }}/.claude/commands"
    state: directory
    mode: '0755'

- name: Find command files in role
  when: deploy_commands | default(true) | bool
  ansible.builtin.find:
    paths: "{{ role_path }}/files/commands"
    patterns: "*.md"
  register: command_files

- name: Symlink each command file into ~/.claude/commands/
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ claude_home }}/.claude/commands/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ command_files.files }}"
  when: deploy_commands | default(true) | bool and claude_config_mode | default('link') == 'link'

- name: Copy each command file into ~/.claude/commands/
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ claude_home }}/.claude/commands/{{ item.path | basename }}"
    mode: '0644'
  loop: "{{ command_files.files }}"
  when: deploy_commands | default(true) | bool and claude_config_mode | default('link') == 'copy'

# ── Settings.local.json (pre-approved permissions) ──────────────────────────
- name: Deploy settings.local.json (link)
  ansible.builtin.file:
    src: "{{ role_path }}/files/settings.local.json"
    dest: "{{ claude_home }}/.claude/settings.local.json"
    state: link
    force: true
  when: claude_config_mode | default('link') == 'link'

- name: Deploy settings.local.json (copy)
  ansible.builtin.copy:
    src: settings.local.json
    dest: "{{ claude_home }}/.claude/settings.local.json"
    mode: '0644'
  when: claude_config_mode | default('link') == 'copy'

# ── Hooks (user-level shell scripts invoked from settings.json hooks block) ──
# preserve-effort-max.sh keeps effortLevel=max in ~/.claude/settings.json even
# when the Claude CLI rewrites the file (toggling plugins, accepting prompts).
#
# Listing uses `fileglob` (a controller-side lookup) rather than `find` so the
# task works in `copy` mode against remote/containerised targets — the role
# files only exist on the controller.
- name: Ensure ~/.claude/hooks directory exists
  ansible.builtin.file:
    path: "{{ claude_home }}/.claude/hooks"
    state: directory
    mode: '0755'

- name: List hook scripts in role (controller-side)
  ansible.builtin.set_fact:
    hook_files: "{{ query('fileglob', role_path ~ '/files/hooks/*.sh') }}"

- name: Symlink each hook script into ~/.claude/hooks/
  ansible.builtin.file:
    src: "{{ item }}"
    dest: "{{ claude_home }}/.claude/hooks/{{ item | basename }}"
    state: link
    force: true
  loop: "{{ hook_files }}"
  when: claude_config_mode | default('link') == 'link'

- name: Copy each hook script into ~/.claude/hooks/
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ claude_home }}/.claude/hooks/{{ item | basename }}"
    mode: '0755'
  loop: "{{ hook_files }}"
  when: claude_config_mode | default('link') == 'copy'

# ── User-level CLI scripts (installed into ~/.local/bin/, on $PATH) ─────────
# Wrapper scripts the user invokes from a shell or another tool. Currently:
#
#   claudeclaw-start.sh  →  workaround for the upstream claudeclaw bug where
#                            the daemon inherits and re-emits the parent
#                            CLAUDE_CODE_OAUTH_TOKEN, causing every spawned
#                            `claude` to 401 once the parent token rotates
#                            (~8h after Claude Desktop restart).
#
# Symlinks/copies into ~/.local/bin/<name without .sh>. Skip Windows since the
# whole role only supports macOS + Linux/WSL2.
- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "{{ claude_home }}/.local/bin"
    state: directory
    mode: '0755'

- name: List bin scripts in role (controller-side)
  ansible.builtin.set_fact:
    bin_scripts: "{{ query('fileglob', role_path ~ '/files/scripts/*.sh') }}"

- name: Symlink each bin script into ~/.local/bin/ (without .sh suffix)
  ansible.builtin.file:
    src: "{{ item }}"
    dest: "{{ claude_home }}/.local/bin/{{ item | basename | regex_replace('\\.sh$', '') }}"
    state: link
    force: true
  loop: "{{ bin_scripts }}"
  when: claude_config_mode | default('link') == 'link'

- name: Copy each bin script into ~/.local/bin/ (without .sh suffix)
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ claude_home }}/.local/bin/{{ item | basename | regex_replace('\\.sh$', '') }}"
    mode: '0755'
  loop: "{{ bin_scripts }}"
  when: claude_config_mode | default('link') == 'copy'

# ── ClaudeClaw user-level config (template + env example) ───────────────────
# Dots ships two files into ~/.config/claudeclaw/:
#
#   settings.template.json  Rendered from claudeclaw-settings.json.j2 using
#                           the Ansible vars listed at the top of the
#                           template. `claudeclaw-start` copies this file
#                           into <project>/.claude/claudeclaw/settings.json
#                           the first time the daemon is launched in that
#                           project (never overwrites existing settings).
#
#   env.example             Documented list of secret env vars the daemon
#                           consumes via $VAR substitution in settings.
#                           User copies this to ~/.config/claudeclaw/env
#                           and fills in values. We never ship or rewrite
#                           the real `env` file — it's gitignored user data.
#
# Directory mode 0700: contains secrets once the user populates env.
- name: Ensure ~/.config/claudeclaw directory exists
  ansible.builtin.file:
    path: "{{ claude_home }}/.config/claudeclaw"
    state: directory
    mode: '0700'
  tags: ['claudeclaw']

- name: Render ClaudeClaw settings template to ~/.config/claudeclaw/
  ansible.builtin.template:
    src: claudeclaw-settings.json.j2
    dest: "{{ claude_home }}/.config/claudeclaw/settings.template.json"
    mode: '0644'
  tags: ['claudeclaw']

- name: Deploy ClaudeClaw env.example (never overwrite user's env)
  ansible.builtin.copy:
    src: claudeclaw/env.example
    dest: "{{ claude_home }}/.config/claudeclaw/env.example"
    mode: '0600'
  tags: ['claudeclaw']

# ── Plugin directory (marketplaces created by `claude plugin install`) ───────
- name: Ensure ~/.claude/plugins directory exists
  ansible.builtin.file:
    path: "{{ claude_home }}/.claude/plugins"
    state: directory
    mode: '0755'

# ── MCP servers (merged into ~/.claude.json) ────────────────────────────────
# Each .json file in files/mcp/ defines MCP servers. They get merged into
# the mcpServers key of ~/.claude.json (the global Claude config).
- name: Find MCP server definition files
  ansible.builtin.find:
    paths: "{{ role_path }}/files/mcp"
    patterns: "*.json"
  register: mcp_files

- name: Merge MCP server definitions into ~/.claude.json
  ansible.builtin.shell: |
    python3 << 'PYEOF'
    import json, glob, os
    claude_json_path = "{{ claude_home }}/.claude.json"
    mcp_dir = "{{ role_path }}/files/mcp"
    config = json.load(open(claude_json_path)) if os.path.exists(claude_json_path) else {}
    if "mcpServers" not in config: config["mcpServers"] = {}
    for f in glob.glob(os.path.join(mcp_dir, "*.json")):
        config["mcpServers"].update(json.load(open(f)))
    json.dump(config, open(claude_json_path, "w"), indent=2)
    PYEOF
  args:
    executable: /bin/bash
  when: mcp_files.matched > 0

# ── Install script ──────────────────────────────────────────────────────────
- name: Copy Claude Code install script
  ansible.builtin.copy:
    src: install.sh
    dest: "{{ claude_home }}/.claude/install.sh"
    mode: '0755'

# ── npm packages (for npx-based skills/tools) ───────────────────────────────
- name: Install npm packages for Claude Code skills
  become: true
  ansible.builtin.command: "npm install -g {{ item }}"
  loop: "{{ claude_npm_packages | default([]) }}"
  when: claude_npm_packages is defined and claude_npm_packages | length > 0
  changed_when: true

# ── Official marketplace plugins ─────────────────────────────────────────────
- name: Install official marketplace plugins
  ansible.builtin.command: "claude plugin install {{ item }}"
  register: plugin_install
  changed_when: false
  failed_when: false
  loop: "{{ claude_plugins | default([]) }}"
  when: claude_plugins | default([]) | length > 0
  environment:
    HOME: "{{ claude_home }}"

- name: Install external plugins from official marketplace
  ansible.builtin.command: "claude plugin install {{ item }}"
  register: ext_plugin_install
  changed_when: false
  failed_when: false
  loop: "{{ claude_external_plugins | default([]) }}"
  when: claude_external_plugins | default([]) | length > 0
  environment:
    HOME: "{{ claude_home }}"

# ── Custom marketplace plugins (e.g., caveman) ──────────────────────────────
- name: Add custom plugin marketplaces
  ansible.builtin.command: "claude plugin marketplace add {{ item }}"
  register: marketplace_add
  changed_when: false
  failed_when: false
  loop: "{{ claude_custom_marketplaces | default([]) }}"
  when: claude_custom_marketplaces | default([]) | length > 0
  environment:
    HOME: "{{ claude_home }}"

- name: Install plugins from custom marketplaces
  ansible.builtin.command: "claude plugin install {{ item }}"
  register: custom_plugin_install
  changed_when: false
  failed_when: false
  loop: "{{ claude_custom_plugins | default([]) }}"
  when: claude_custom_plugins | default([]) | length > 0
  environment:
    HOME: "{{ claude_home }}"

# ── Docker-mode: deploy container entrypoint ─────────────────────────────────
# The entrypoint invokes `ansible-playbook sync-claude.yml` on every container
# start, re-running the idempotent tasks above against the mounted ~/.claude
# volume so dots updates propagate without a rebuild.
- name: "[Docker] Deploy container entrypoint script"
  become: true
  ansible.builtin.copy:
    src: entrypoint.sh
    dest: /usr/local/bin/entrypoint.sh
    mode: '0755'
    owner: root
    group: root
  when: claude_config_mode | default('link') == 'copy'
