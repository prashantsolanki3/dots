services:
  ubuntu-test:
    build:
      context: tests
      dockerfile: Dockerfile.ubuntu
    volumes:
      - .:/dots:ro
      - ~/.ssh/id_rsa.pub:/tmp/host_id_rsa.pub:ro
      - claude-credentials:/root/.claude-credentials
    working_dir: /dots
    ports:
      - "2222:22"
    environment:
      - ANTHROPIC_API_KEY

# Named volume — credentials survive container rebuilds
volumes:
  claude-credentials:
