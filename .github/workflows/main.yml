name: Ansible-CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # NOTE: A full ansible-lint pass currently surfaces 650+ pre-existing
  # violations across the repo (FQCN, no-changed-when, trailing-spaces, etc.).
  # Re-introduce lint as a separate CI job once the codebase is cleaned up —
  # bundling the cleanup with a runner swap blocked the infra fix.
  syntax-check:
    name: syntax-check (${{ matrix.playbook }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            playbook: dev.yml
          - os: macos-latest
            playbook: mac.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ansible
        run: pip install ansible
      - name: Install required collections
        run: ansible-galaxy collection install community.general
      - name: Syntax check ${{ matrix.playbook }}
        run: ansible-playbook --syntax-check ${{ matrix.playbook }} -i "localhost," -e "host_username=$(whoami)"
