---
# Copy config files to the remote location
- name: Copy HMS Config
  become: true
  ansible.builtin.copy:
    src: ansible-hms-docker-config.yml
    dest: /opt/ansible-hms-docker/vars/default.yml

- name: Run HMS Docker
  become: true
  ansible.builtin.command: ansible-playbook -i /opt/ansible-hms-docker/inventory --connection local /opt/ansible-hms-docker/hms-docker.yml
