---
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: yes
  register: result
  until: result is not failed
  retries: '{{ apt_retries }}'
  delay: '{{ apt_retry_delay }}'

- name: Upgrade packages
  become: true
  ansible.builtin.apt:
    upgrade: yes
    autoremove: yes
  register: result
  until: result is not failed
  retries: '{{ apt_retries }}'
  delay: '{{ apt_retry_delay }}'
