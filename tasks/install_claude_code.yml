---
# Install the Claude Code CLI.
#
# macOS  — no-op. Install claude via the desktop app or a future brew formula.
# Linux  — installs Node 20 LTS via NodeSource, then claude via npm globally.
#           Requires become (sudo) on non-root users.
#
# No variables required.

# ── Linux: install Node 20 + claude ──────────────────────────────────────────
- name: "[Linux] Install curl and ca-certificates"
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: yes
  become: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Add NodeSource Node 20 repo"
  ansible.builtin.shell:
    cmd: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    creates: /etc/apt/sources.list.d/nodesource.list
  become: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Install Node.js 20"
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: yes
  become: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Check if claude is already installed"
  ansible.builtin.command: which claude
  register: claude_installed
  failed_when: false
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Install claude via npm"
  ansible.builtin.command: npm install -g @anthropic-ai/claude-code
  become: yes
  when:
    - ansible_facts['os_family'] == "Debian"
    - claude_installed.rc != 0

# ── macOS: no-op ──────────────────────────────────────────────────────────────
- name: "[macOS] Skip — install claude via the desktop app or brew"
  ansible.builtin.debug:
    msg: "macOS: claude installation is managed outside Ansible."
  when: ansible_facts['os_family'] == "Darwin"
